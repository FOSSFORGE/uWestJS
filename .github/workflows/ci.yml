name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
        nestjs-version: [9, 10, 11]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install NestJS ${{ matrix.nestjs-version }}
        run: |
          npm install --save-dev @nestjs/common@^${{ matrix.nestjs-version }}.0.0
          npm install --save-dev @nestjs/websockets@^${{ matrix.nestjs-version }}.0.0
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests
        run: npm run test:cov
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
      
      - name: Build
        run: npm run build

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build package
        run: npm run build
      
      - name: Pack
        run: npm pack
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: '*.tgz'
